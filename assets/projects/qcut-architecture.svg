<svg width="430" height="300" viewBox="0 0 430 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">QCut architecture card</title>
  <desc id="desc">A QCut system card showing User and Auth, Link API, Analytics and QNote, and Security workflow.</desc>
  <rect width="430" height="300" rx="18" fill="#0D1117"/>
  <rect x="18" y="18" width="394" height="264" rx="16" fill="#111827" stroke="#2A3344"/>
  <text x="34" y="54" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">QCut</text>
  <text x="34" y="76" fill="#F97316" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">Link Analytics + QNote Platform</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">
    <rect x="34" y="108" width="88" height="48" rx="12" fill="#0B1220" stroke="#38BDF8"/>
    <text x="55" y="137" fill="#F8FAFC">User/Auth</text>
    <rect x="146" y="108" width="88" height="48" rx="12" fill="#0B1220" stroke="#A855F7"/>
    <text x="167" y="137" fill="#F8FAFC">Link API</text>
    <rect x="258" y="108" width="120" height="48" rx="12" fill="#0B1220" stroke="#22C55E"/>
    <text x="276" y="137" fill="#F8FAFC">Analytics/QNote</text>
    <path d="M122 132H146M234 132H258" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
  </g>
  <rect x="54" y="184" width="322" height="36" rx="10" fill="#0B1220" stroke="#F97316"/>
  <text x="78" y="207" fill="#F8FAFC" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">Security: abuse checks / Turnstile / gitleaks</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#94A3B8">
    <text x="36" y="250">Next.js  TypeScript  Clerk  PostgreSQL  Redis</text>
    <text x="36" y="268">Drizzle  Zod  Recharts  Cloudflare  Playwright</text>
  </g>
</svg>
