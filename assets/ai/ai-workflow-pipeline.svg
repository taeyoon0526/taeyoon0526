<svg width="894" height="260" viewBox="0 0 894 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI engineering workflow pipeline</title>
  <desc id="desc">A terminal-style AI engineering pipeline showing Prompt, Plan, Patch, Verify, and Deploy.</desc>
  <rect width="894" height="260" rx="24" fill="#0D1117"/>
  <rect x="34" y="28" width="826" height="204" rx="18" fill="#111827" stroke="#2A3344"/>
  <text x="66" y="70" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">AI Engineering Lab</text>
  <text x="66" y="98" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">AI as a structured engineering layer, not a shortcut around verification.</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700">
    <rect x="66" y="132" width="116" height="48" rx="12" fill="#0B1220" stroke="#A855F7"/>
    <text x="98" y="161" fill="#F8FAFC">Prompt</text>
    <rect x="222" y="132" width="116" height="48" rx="12" fill="#0B1220" stroke="#38BDF8"/>
    <text x="252" y="161" fill="#F8FAFC">Plan</text>
    <rect x="378" y="132" width="116" height="48" rx="12" fill="#0B1220" stroke="#22C55E"/>
    <text x="406" y="161" fill="#F8FAFC">Patch</text>
    <rect x="534" y="132" width="116" height="48" rx="12" fill="#0B1220" stroke="#FACC15"/>
    <text x="557" y="161" fill="#F8FAFC">Verify</text>
    <rect x="690" y="132" width="116" height="48" rx="12" fill="#0B1220" stroke="#F97316"/>
    <text x="716" y="161" fill="#F8FAFC">Deploy</text>
    <path d="M182 156H222M338 156H378M494 156H534M650 156H690" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="66" y="210" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Research, spec design, repo analysis, code review, automated QA, and hardening workflows.</text>
</svg>
