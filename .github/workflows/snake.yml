name: Contribution Snake

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - README.md
      - .github/workflows/snake.yml

permissions:
  contents: write

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: taeyoon0526
          outputs: |
            assets/widgets/github-contribution-grid-snake.svg?palette=github-light&color_snake=F97316
            assets/widgets/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=38BDF8

      - name: Commit generated SVGs
        run: |
          if git diff --quiet -- assets/widgets/github-contribution-grid-snake.svg assets/widgets/github-contribution-grid-snake-dark.svg; then
            echo "No contribution snake changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/widgets/github-contribution-grid-snake.svg assets/widgets/github-contribution-grid-snake-dark.svg
          git commit -m "chore: update contribution snake [skip ci]"
          git push
